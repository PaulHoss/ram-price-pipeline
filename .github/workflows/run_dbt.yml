name: Daily dbt Transformations

on:
  schedule:
    - cron: '30 00 * * *'   # 30 min after scraper runs at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dbt_run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core dbt-athena

      - name: Write dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          ram_price_dbt:
            target: prod
            outputs:
              prod:
                type: athena
                s3_staging_dir: s3://${{ secrets.AWS_S3_BUCKET }}/athena-results/
                s3_data_dir: s3://${{ secrets.AWS_S3_BUCKET }}/dbt/
                region_name: ${{ secrets.AWS_REGION }}
                schema: ram_price_dbt
                database: awsdatacatalog
                threads: 1
                aws_access_key_id: ${{ secrets.DBT_AWS_ACCESS_KEY_ID }}
                aws_secret_access_key: ${{ secrets.DBT_AWS_SECRET_ACCESS_KEY }}
          EOF

      - name: Run dbt
        working-directory: ram_price_dbt
        run: dbt run --target prod

      - name: Run dbt tests
        working-directory: ram_price_dbt
        run: dbt test --target prod
        continue-on-error: true