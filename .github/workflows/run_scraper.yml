name: Daily E-Commerce Price Scraper

# 1. Schedule the workflow to run automatically
on:
  schedule:
    # Runs at 15:00 UTC every single day
    - cron: '0 00 * * *'
  
  # Allows you to manually trigger the workflow anytime from the GitHub Actions tab
  workflow_dispatch:

# 2. Grant permissions to let the workflow write data back to the repository
permissions:
  contents: write

jobs:
  scrape_and_store:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code onto the GitHub cloud server
    - name: Checkout Repository
      uses: actions/checkout@v6

    # Step 2: Set up a secure Python environment
    - name: Set up Python 3.14
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
        cache: 'pip' # Automatically caches dependencies to speed up future runs

    # Step 3: Install all required Python packages
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Step 4: Execute the orchestrator script
    - name: Run Scraper Pipeline
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
      run: python scraper.py
