name: One-Time Athena Setup

# This workflow runs setup_athena.py once to create the Glue database and table.
# After that, Athena is permanently configured — you don't need to run this again
# unless you drop the table or database and need to recreate them.
# Trigger it manually from the GitHub Actions tab whenever you're ready.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup_athena:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Set up Python 3.14
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install boto3

    - name: Run Athena Setup
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
      run: python infrastructure/setup_athena.py
